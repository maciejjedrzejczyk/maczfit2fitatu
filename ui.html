<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Maczfit → Fitatu Sync</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #1a1a1a; }
.app { display: flex; height: 100vh; gap: 12px; padding: 12px; }
.panel { flex: 1; display: flex; flex-direction: column; background: #fff; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.1); overflow: hidden; }
.panel-header { padding: 16px; background: linear-gradient(135deg, #4CAF50, #45a049); color: #fff; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.panel-header.fitatu { background: linear-gradient(135deg, #FF8700, #e67600); }
.panel-header h2 { font-size: 18px; flex: 1; }
.panel-header input[type=date] { padding: 6px 10px; border: none; border-radius: 6px; font-size: 14px; }
.panel-header .date-nav { display: flex; align-items: center; gap: 4px; }
.panel-header .date-nav button { background: rgba(255,255,255,.25); border: none; color: #fff; font-size: 18px; width: 28px; height: 28px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.panel-header .date-nav button:hover { background: rgba(255,255,255,.4); }
.panel-body { flex: 1; overflow-y: auto; padding: 12px; }
.meal-card { padding: 12px; margin-bottom: 8px; border-radius: 8px; border: 1px solid #e0e0e0; background: #fafafa; cursor: grab; transition: box-shadow .15s, transform .15s; }
.meal-card:active { cursor: grabbing; }
.meal-card.dragging { opacity: .5; transform: scale(.97); }
.meal-card .dish { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
.meal-card .label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: .5px; }
.meal-card .macros { font-size: 12px; color: #555; margin-top: 4px; }
.meal-card .macros span { margin-right: 8px; }
.meal-card .actions { float: right; margin-top: -2px; }
.meal-card .actions button { background: none; border: none; cursor: pointer; font-size: 14px; padding: 2px 4px; border-radius: 4px; opacity: .5; }
.meal-card .actions button:hover { opacity: 1; background: #f0f0f0; }
.maczfit-row { margin-bottom: 12px; }
.maczfit-row-header { font-size: 13px; font-weight: 600; text-transform: uppercase; color: #666; padding: 6px 0; border-bottom: 2px solid #eee; margin-bottom: 6px; }
.maczfit-cols { display: flex; gap: 4px; }
.maczfit-col-side { flex: 1; min-width: 0; }
.maczfit-col-side .meal-card { font-size: 11px; padding: 6px 8px; }
.maczfit-col-side .meal-card .dish { font-size: 11px; }
.maczfit-col-side .meal-card .macros { font-size: 10px; }
.maczfit-col-side .meal-card .label { display: none; }
.maczfit-col-main { flex: 3; min-width: 0; }
.maczfit-col-main .meal-card .label { display: none; }
.maczfit-col-side:first-child { border-right: 2px dashed #e0e0e0; padding-right: 4px; }
.maczfit-col-side:last-child { border-left: 2px dashed #e0e0e0; padding-left: 4px; }
.maczfit-col-label { font-size: 10px; color: #aaa; text-align: center; margin-bottom: 2px; }
.maczfit-empty { color: #bbb; font-size: 11px; padding: 6px; text-align: center; font-style: italic; }
.slot { margin-bottom: 12px; }
.slot-header { font-size: 13px; font-weight: 600; text-transform: uppercase; color: #666; padding: 6px 0; border-bottom: 2px solid #eee; margin-bottom: 6px; display: flex; justify-content: space-between; }
.slot-header .slot-total { font-weight: 400; color: #999; }
.slot-columns { display: flex; gap: 4px; }
.slot-col-today { flex: 3; min-width: 0; }
.slot-col-next { flex: 1; min-width: 0; border-left: 2px dashed #e0e0e0; padding-left: 4px; }
.slot-col-next .meal-card { font-size: 11px; padding: 6px 8px; }
.slot-col-next .meal-card .dish { font-size: 11px; }
.slot-col-next .meal-card .macros { font-size: 10px; }
.slot-col-next .meal-card .actions button { font-size: 11px; }
.slot-col-next .empty-slot { font-size: 11px; padding: 6px; }
.slot-col-label { font-size: 10px; color: #aaa; text-align: center; margin-bottom: 2px; }
.slot-items { min-height: 40px; padding: 4px; border-radius: 6px; transition: background .15s; }
.slot-items.drag-over { background: #fff3e0; border: 2px dashed #FF8700; }
.slot-items .meal-card { cursor: default; background: #fff; }
.slot-items .meal-card.from-maczfit { border-left: 3px solid #4CAF50; }
.empty-slot { color: #bbb; font-size: 13px; padding: 10px; text-align: center; font-style: italic; }
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 10px 24px; border-radius: 8px; color: #fff; font-size: 14px; z-index: 100; animation: fadeInOut 2.5s; }
.toast.ok { background: #4CAF50; }
.toast.err { background: #f44336; }
@keyframes fadeInOut { 0%{opacity:0;transform:translateX(-50%) translateY(10px)} 15%{opacity:1;transform:translateX(-50%) translateY(0)} 85%{opacity:1} 100%{opacity:0} }
.loading { text-align: center; padding: 40px; color: #999; }
.day-total { padding: 12px; border-top: 2px solid #eee; font-size: 13px; font-weight: 600; color: #333; flex-shrink: 0; }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 50; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: #fff; border-radius: 12px; padding: 24px; width: 360px; box-shadow: 0 8px 30px rgba(0,0,0,.2); }
.modal h3 { margin-bottom: 16px; font-size: 16px; }
.modal label { display: block; font-size: 12px; color: #666; margin-top: 10px; }
.modal input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; margin-top: 2px; }
.modal .btn-row { display: flex; gap: 8px; margin-top: 18px; }
.modal button { flex: 1; padding: 10px; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; }
.modal .btn-save { background: #FF8700; color: #fff; }
.modal .btn-cancel { background: #eee; color: #333; }
</style>
</head>
<body>
<div class="app">
  <!-- LEFT: Maczfit -->
  <div class="panel">
    <div class="panel-header">
      <h2>🥗 Maczfit</h2>
      <div class="date-nav">
        <button onclick="shiftDate(maczfitDate,-1,loadMaczfit)">‹</button>
        <input type="date" id="maczfit-date">
        <button onclick="shiftDate(maczfitDate,1,loadMaczfit)">›</button>
      </div>
    </div>
    <div class="panel-body" id="maczfit-meals">
      <div class="loading">Loading...</div>
    </div>
    <div class="day-total" id="maczfit-total"></div>
  </div>

  <!-- RIGHT: Fitatu -->
  <div class="panel">
    <div class="panel-header fitatu">
      <h2>📊 Fitatu</h2>
      <div class="date-nav">
        <button onclick="shiftDate(fitatuDate,-1,loadFitatu)">‹</button>
        <input type="date" id="fitatu-date">
        <button onclick="shiftDate(fitatuDate,1,loadFitatu)">›</button>
      </div>
    </div>
    <div class="panel-body" id="fitatu-slots"></div>
    <div class="day-total" id="fitatu-total"></div>
  </div>
</div>

<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <h3>Edit meal</h3>
    <label>Name<input id="ed-name"></label>
    <label>Calories (kcal)<input id="ed-energy" type="number"></label>
    <label>Protein (g)<input id="ed-protein" type="number" step="0.1"></label>
    <label>Fat (g)<input id="ed-fat" type="number" step="0.1"></label>
    <label>Carbs (g)<input id="ed-carbs" type="number" step="0.1"></label>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeEdit()">Cancel</button>
      <button class="btn-save" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>

<script>
const SLOTS = ['breakfast','second_breakfast','lunch','dinner','snack','supper'];
const SLOT_LABELS = {breakfast:'Breakfast',second_breakfast:'2nd Breakfast',lunch:'Lunch',dinner:'Dinner',snack:'Snack',supper:'Supper'};
const today = new Date().toISOString().slice(0,10);

const maczfitDate = document.getElementById('maczfit-date');
const fitatuDate = document.getElementById('fitatu-date');
const maczfitEl = document.getElementById('maczfit-meals');
const maczfitTotalEl = document.getElementById('maczfit-total');
const fitatuEl = document.getElementById('fitatu-slots');
const totalEl = document.getElementById('fitatu-total');

maczfitDate.value = today;
fitatuDate.value = today;

function toast(msg, ok=true) {
  const t = document.createElement('div');
  t.className = 'toast ' + (ok ? 'ok' : 'err');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2600);
}

function nextDay(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  d.setDate(d.getDate() + 1);
  return d.toISOString().slice(0, 10);
}

function prevDay(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  d.setDate(d.getDate() - 1);
  return d.toISOString().slice(0, 10);
}

function shiftDate(input, delta, callback) {
  const d = new Date(input.value + 'T12:00:00');
  d.setDate(d.getDate() + delta);
  input.value = d.toISOString().slice(0, 10);
  callback();
}

function macroHtml(m) {
  return `<span>${m.kcal||m.energy||0} kcal</span><span>P: ${m.protein||0}g</span><span>F: ${m.fat||0}g</span><span>C: ${m.carbs||m.carbohydrate||0}g</span>`;
}

// --- Maczfit ---
const MEAL_ORDER = ['Śniadanie','II Śniadanie','Obiad','Podwieczorek','Kolacja'];

function groupByLabel(meals) {
  const g = {};
  meals.forEach(m => { (g[m.label] = g[m.label] || []).push(m); });
  return g;
}

function makeMaczfitCard(m) {
  const card = document.createElement('div');
  card.className = 'meal-card';
  card.draggable = true;
  card.innerHTML = `<div class="label">${m.label}</div><div class="dish">${m.dish}</div><div class="macros">${macroHtml(m)}</div>`;
  card.addEventListener('dragstart', e => {
    card.classList.add('dragging');
    e.dataTransfer.setData('application/json', JSON.stringify(m));
  });
  card.addEventListener('dragend', () => card.classList.remove('dragging'));
  return card;
}

async function fetchMaczfitDay(dateStr) {
  try {
    const r = await fetch(`/api/maczfit/${dateStr}`);
    const d = await r.json();
    return d.meals || [];
  } catch { return []; }
}

async function loadMaczfit() {
  maczfitEl.innerHTML = '<div class="loading">Loading Maczfit meals...</div>';
  maczfitTotalEl.textContent = '';
  const curDate = maczfitDate.value;
  const prev = prevDay(curDate);
  const nxt = nextDay(curDate);
  try {
    const [prevMeals, curMeals, nxtMeals] = await Promise.all([
      fetchMaczfitDay(prev), fetchMaczfitDay(curDate), fetchMaczfitDay(nxt)
    ]);
    const prevG = groupByLabel(prevMeals);
    const curG = groupByLabel(curMeals);
    const nxtG = groupByLabel(nxtMeals);

    // Collect all labels in order
    const labels = [...new Set([...MEAL_ORDER, ...Object.keys(curG), ...Object.keys(prevG), ...Object.keys(nxtG)])];

    maczfitEl.innerHTML = '';
    let tK=0, tP=0, tF=0, tC=0;
    curMeals.forEach(m => { tK += m.kcal||0; tP += m.protein||0; tF += m.fat||0; tC += m.carbs||0; });

    labels.forEach(label => {
      const pItems = prevG[label] || [];
      const cItems = curG[label] || [];
      const nItems = nxtG[label] || [];
      if (!pItems.length && !cItems.length && !nItems.length) return;

      const row = document.createElement('div');
      row.className = 'maczfit-row';
      row.innerHTML = `<div class="maczfit-row-header">${label}</div>`;

      const cols = document.createElement('div');
      cols.className = 'maczfit-cols';

      // Prev column (20%)
      const prevCol = document.createElement('div');
      prevCol.className = 'maczfit-col-side';
      prevCol.innerHTML = `<div class="maczfit-col-label">${prev}</div>`;
      if (!pItems.length) prevCol.innerHTML += '<div class="maczfit-empty">—</div>';
      pItems.forEach(m => prevCol.appendChild(makeMaczfitCard(m)));

      // Current column (60%)
      const curCol = document.createElement('div');
      curCol.className = 'maczfit-col-main';
      if (!cItems.length) curCol.innerHTML = '<div class="maczfit-empty">—</div>';
      cItems.forEach(m => curCol.appendChild(makeMaczfitCard(m)));

      // Next column (20%)
      const nxtCol = document.createElement('div');
      nxtCol.className = 'maczfit-col-side';
      nxtCol.innerHTML = `<div class="maczfit-col-label">${nxt}</div>`;
      if (!nItems.length) nxtCol.innerHTML += '<div class="maczfit-empty">—</div>';
      nItems.forEach(m => nxtCol.appendChild(makeMaczfitCard(m)));

      cols.appendChild(prevCol);
      cols.appendChild(curCol);
      cols.appendChild(nxtCol);
      row.appendChild(cols);
      maczfitEl.appendChild(row);
    });

    maczfitTotalEl.textContent = `Day total: ${Math.round(tK)} kcal | P: ${tP.toFixed(1)}g | F: ${tF.toFixed(1)}g | C: ${tC.toFixed(1)}g`;
  } catch(e) { maczfitEl.innerHTML = `<div class="loading">Error: ${e.message}</div>`; }
}

// --- Fitatu ---
let fitatuData = {};      // current day
let fitatuNextData = {};   // next day

function makeDropZone(zone, targetDate, slot) {
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', async e => {
    e.preventDefault(); zone.classList.remove('drag-over');
    const raw = e.dataTransfer.getData('application/json');
    if (!raw) return;
    const payload = JSON.parse(raw);
    if (payload._fitatu_move) {
      await moveFitatuItem(payload, slot, targetDate);
    } else {
      await syncMeal(slot, payload, targetDate);
    }
  });
}

function makeItemCard(it, slot, itemDate) {
  const card = document.createElement('div');
  const isMaczfit = it._fromMaczfit;
  card.className = 'meal-card' + (isMaczfit ? ' from-maczfit' : '');
  card.draggable = true;
  card.innerHTML = `<div class="actions"><button class="edit-btn" title="Edit">✎</button><button class="del-btn" title="Remove">✕</button></div><div class="dish">${it.name||it.dish}</div><div class="macros">${macroHtml({kcal:it.energy,protein:it.protein,fat:it.fat,carbs:it.carbohydrate})}</div>`;
  card.addEventListener('dragstart', e => {
    card.classList.add('dragging');
    e.dataTransfer.setData('application/json', JSON.stringify({
      ...it, _fitatu_move: true, _from_slot: slot, _from_date: itemDate
    }));
  });
  card.addEventListener('dragend', () => card.classList.remove('dragging'));
  card.querySelector('.del-btn').addEventListener('click', async () => {
    if (!it.id) { toast('Cannot delete: no item ID', false); return; }
    await deleteFitatuItem(slot, it, itemDate);
  });
  card.querySelector('.edit-btn').addEventListener('click', () => openEdit(slot, it, itemDate));
  return card;
}

function renderFitatu() {
  fitatuEl.innerHTML = '';
  const curDate = fitatuDate.value;
  const nxtDate = nextDay(curDate);
  let totalKcal=0, totalP=0, totalF=0, totalC=0;

  SLOTS.forEach(slot => {
    const items = fitatuData[slot] || [];
    const nextItems = fitatuNextData[slot] || [];
    const div = document.createElement('div');
    div.className = 'slot';

    const slotKcal = items.reduce((s,i) => s+(i.energy||i.kcal||0), 0);
    totalKcal += slotKcal;
    items.forEach(i => { totalP += i.protein||0; totalF += i.fat||0; totalC += i.carbohydrate||i.carbs||0; });

    div.innerHTML = `<div class="slot-header"><span>${SLOT_LABELS[slot]}</span><span class="slot-total">${Math.round(slotKcal)} kcal</span></div>`;

    const cols = document.createElement('div');
    cols.className = 'slot-columns';

    // Today column (75%)
    const todayCol = document.createElement('div');
    todayCol.className = 'slot-col-today';
    const todayZone = document.createElement('div');
    todayZone.className = 'slot-items';
    makeDropZone(todayZone, curDate, slot);
    if (!items.length) todayZone.innerHTML = '<div class="empty-slot">Drop meal here</div>';
    items.forEach(it => todayZone.appendChild(makeItemCard(it, slot, curDate)));
    todayCol.appendChild(todayZone);

    // Next-day column (25%)
    const nextCol = document.createElement('div');
    nextCol.className = 'slot-col-next';
    nextCol.innerHTML = `<div class="slot-col-label">${nxtDate}</div>`;
    const nextZone = document.createElement('div');
    nextZone.className = 'slot-items';
    makeDropZone(nextZone, nxtDate, slot);
    if (!nextItems.length) nextZone.innerHTML = '<div class="empty-slot">Empty</div>';
    nextItems.forEach(it => nextZone.appendChild(makeItemCard(it, slot, nxtDate)));
    nextCol.appendChild(nextZone);

    cols.appendChild(todayCol);
    cols.appendChild(nextCol);
    div.appendChild(cols);
    fitatuEl.appendChild(div);
  });
  totalEl.textContent = `Day total: ${Math.round(totalKcal)} kcal | P: ${totalP.toFixed(1)}g | F: ${totalF.toFixed(1)}g | C: ${totalC.toFixed(1)}g`;
}

async function loadFitatu() {
  fitatuEl.innerHTML = '<div class="loading">Loading Fitatu planner...</div>';
  const curDate = fitatuDate.value;
  const nxtDate = nextDay(curDate);
  try {
    const [r1, r2] = await Promise.all([
      fetch(`/api/fitatu/${curDate}`),
      fetch(`/api/fitatu/${nxtDate}`)
    ]);
    const [d1, d2] = await Promise.all([r1.json(), r2.json()]);
    fitatuData = d1.slots || {};
    fitatuNextData = d2.slots || {};
    renderFitatu();
  } catch(e) { fitatuEl.innerHTML = `<div class="loading">Error: ${e.message}</div>`; }
}

async function syncMeal(slot, meal, targetDate) {
  try {
    const r = await fetch('/api/sync', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ date: targetDate, slot, meal })
    });
    const data = await r.json();
    if (data.ok) {
      await loadFitatu();
      toast(`✓ ${meal.dish.slice(0,40)} → ${SLOT_LABELS[slot]}`);
    } else { toast(data.error || 'Sync failed', false); }
  } catch(e) { toast(e.message, false); }
}

async function deleteFitatuItem(slot, item, itemDate) {
  try {
    const r = await fetch('/api/fitatu/delete', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ date: itemDate, slot, item })
    });
    const data = await r.json();
    if (data.ok) {
      await loadFitatu();
      toast(`✕ Removed ${(item.name||'').slice(0,40)}`);
    } else { toast(data.error || 'Delete failed', false); }
  } catch(e) { toast(e.message, false); }
}

async function moveFitatuItem(item, toSlot, toDate) {
  const fromSlot = item._from_slot;
  const fromDate = item._from_date;
  if (fromSlot === toSlot && fromDate === toDate) return;
  try {
    const r = await fetch('/api/fitatu/move', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ fromDate, toDate, fromSlot, toSlot, item })
    });
    const data = await r.json();
    if (data.ok) {
      await loadFitatu();
      toast(`↻ Moved ${(item.name||'').slice(0,30)} → ${SLOT_LABELS[toSlot]}`);
    } else { toast(data.error || 'Move failed', false); }
  } catch(e) { toast(e.message, false); }
}

// --- Edit modal ---
let editCtx = null;
const editModal = document.getElementById('edit-modal');

function openEdit(slot, item, itemDate) {
  editCtx = { slot, item, date: itemDate };
  document.getElementById('ed-name').value = item.name || '';
  document.getElementById('ed-energy').value = item.energy || 0;
  document.getElementById('ed-protein').value = item.protein || 0;
  document.getElementById('ed-fat').value = item.fat || 0;
  document.getElementById('ed-carbs').value = item.carbohydrate || 0;
  editModal.classList.add('open');
}

function closeEdit() { editModal.classList.remove('open'); editCtx = null; }

async function saveEdit() {
  if (!editCtx) return;
  const { slot, item, date: editDate } = editCtx;
  const updated = {
    name: document.getElementById('ed-name').value,
    energy: +document.getElementById('ed-energy').value,
    protein: +document.getElementById('ed-protein').value,
    fat: +document.getElementById('ed-fat').value,
    carbohydrate: +document.getElementById('ed-carbs').value,
  };
  closeEdit();
  try {
    const r = await fetch('/api/fitatu/edit', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ date: editDate, slot, item, updated })
    });
    const data = await r.json();
    if (data.ok) {
      await loadFitatu();
      toast(`✎ Updated ${updated.name.slice(0,40)}`);
    } else { toast(data.error || 'Edit failed', false); }
  } catch(e) { toast(e.message, false); }
}

maczfitDate.addEventListener('change', loadMaczfit);
fitatuDate.addEventListener('change', loadFitatu);
loadMaczfit();
loadFitatu();
</script>
</body>
</html>
